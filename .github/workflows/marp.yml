name: Deploy Marp Slides
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Marp Build (HTML & PDF)
        run: |
          # 1. Identificar el archivo (Busca cualquier .md dentro de la carpeta slides)
          # Lo renombramos internamente a "input.md" para que los comandos de Docker sean fijos
          INPUT_FILE=$(ls slides/*.md | head -n 1)
          echo "Procesando archivo: $INPUT_FILE"
          cp "$INPUT_FILE" input.md

          # 2. FIX de permisos para Docker
          chmod 777 input.md

          # 3. Generar HTML
          docker run --rm -v $GITHUB_WORKSPACE:/home/marp/app \
            marpteam/marp-cli \
            --html input.md -o index.html

          # 4. Generar PDF (con el fix de Sandbox de Chrome)
          docker run --rm -v $GITHUB_WORKSPACE:/home/marp/app \
            marpteam/marp-cli \
            --chrome-arg --no-sandbox \
            --chrome-arg --disable-setuid-sandbox \
            --allow-local-files \
            --pdf input.md -o presentacion-instituciones-uva.pdf

      - name: Prepare public folder
        run: |
          mkdir -p public
          [ -f index.html ] && mv index.html public/
          [ -f presentacion-instituciones-uva.pdf ] && mv presentacion-instituciones-uva.pdf public/
          
          # Copiamos la carpeta de imágenes si existe (indiferente de si está en raíz o dentro de slides)
          cp -r images public/ 2>/dev/null || true
          cp -r slides/images public/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
