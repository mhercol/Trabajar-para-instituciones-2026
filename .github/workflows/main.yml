name: Sync to UVA 2025

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout privado
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Limpieza de rastro
        run: |
          # 1. Borramos la carpeta .git para que el historial sea nuevo
          rm -rf .git
          
          # 2. IMPORTANTE: Borramos el script de sincronización. 
          # Así, el repo público NUNCA verá este archivo y no intentará ejecutarse a sí mismo.
          rm -f .github/workflows/publish.yml
          
          # 3. Limpieza de comentarios (Corregido: 's/texto/reemplazo/g')
          # Esto busca marcas de agua de la IA y las elimina
          find . -type f -name "*.md" -exec sed -i 's///g' {} + || true
          find . -type f -name "*.md" -exec sed -i 's///g' {} + || true
          
          # 4. Configuración de Git
          git config --global user.name "mhercol"
          git config --global user.email "mhercol@gmail.com"

      - name: Push al repo público
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.UVA_DEPLOY_TOKEN }}
        with:
          source-directory: '.'
          destination-github-username: 'mhercol'
          destination-repository-name: 'Trabajar-para-instituciones-2026'
          user-email: 'mhercol@gmail.com'
          target-branch: main
